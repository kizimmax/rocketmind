openapi: 3.0.3

# ─────────────────────────────────────────────────────────────────────────────
# Rocketmind SaaS — Backend API contract (Mongo + custom backend by Иван)
# ─────────────────────────────────────────────────────────────────────────────
# Этот документ — источник истины для фронта (`apps/saas-admin`,
# `apps/saas-teacher`) и бэка (Иван, Amvera, Mongo). Любые правки сначала
# отражаются здесь, потом в коде.
#
# Архитектура:
#   - apps/saas-admin  — админка управления SaaS (3006). Использует все
#     /api/admin/*, /api/programs, /api/ai-agents, /api/students endpoints.
#   - apps/saas-teacher — клиент-приложение для учеников (3005). Использует
#     /api/auth/*, /api/students/me, /api/students/me/projects, /api/chat,
#     /api/programs/active.
#   - n8n остаётся отдельно у Ивана на Amvera. Webhook-URL агента (см. AiAgent
#     model) фронт-saas-teacher вызывает напрямую (или Иван проксирует — TBD).
#
# Схемы под `components.schemas` соответствуют коллекциям Mongo (один-в-один с
# именами). Иван имеет право денормализовать на стороне бэка — главное,
# чтобы наружу через API возвращалось то, что описано здесь.

info:
  title: Rocketmind SaaS Backend API
  version: 0.1.0-draft
  description: |
    Контракт между фронтами (saas-admin / saas-teacher) и бэком Ивана.
    Этот документ — draft. Иван правит → возвращает → согласовываем финал.

servers:
  - url: https://api.rocketmind.* # production (TBD)
    description: Production
  - url: http://localhost:4000 # local dev (если Иван поднимет локально)
    description: Local dev

tags:
  - name: admin-auth
    description: Авторизация админов saas-admin (super-admin / admin / editor)
  - name: admin-users
    description: CRUD админских аккаунтов и пермиссий
  - name: ai-agents
    description: Каталог AI-агентов (общий для Teacher и Akselerator)
  - name: programs
    description: Программы Teacher (с QR, агентами, учениками)
  - name: places
    description: Места проведения программ (справочник)
  - name: students
    description: SaaS-пользователи (ученики Teacher)
  - name: student-auth
    description: OTP-вход учеников
  - name: student-me
    description: Анкета и проекты текущего ученика
  - name: chat
    description: Стриминг чата с AI-агентом
  - name: audit-log
    description: Аудит-лог админских действий (этап 2)

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY SCHEMES
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    AdminJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT-токен админа saas-admin. Кладётся в HttpOnly cookie `rm_admin_token`
        после `/api/admin/login` или передаётся в `Authorization: Bearer`.
    StudentJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT ученика. Cookie `rm_student_token` (HttpOnly, 90 дней). Подписан
        STUDENT_JWT_SECRET. Создаётся после `/api/auth/verify-code`.
    ServiceToken:
      type: apiKey
      in: header
      name: X-Service-Token
      description: |
        Используется для cross-app запросов (saas-admin → site-admin для
        чтения каталога маскотов).

  # ───────────────────────────────────────────────────────────────────────────
  # SCHEMAS — Mongo collections shape (also: API response/request types)
  # ───────────────────────────────────────────────────────────────────────────
  schemas:
    # ───── Common ─────
    Role:
      type: string
      enum: [SUPER_ADMIN, ADMIN, EDITOR]
      description: |
        Роль админа в saas-admin:
          • SUPER_ADMIN — всё (управление другими админами, программами, агентами, всеми данными). Один на систему (по сути Алексей).
          • ADMIN — управление программами/агентами/пользователями, без создания других админов.
          • EDITOR — видит и редактирует только то, что супер-админ явно открыл через `permissions[]`.
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Machine-readable код ошибки. Фронт по нему рендерит локализованные тексты.
          examples: [unauthorized, not_found, validation_failed, program_closed, agent_not_available, slug_exists]
        message:
          type: string
          description: Человекочитаемое описание (опционально, для дебага).

    # ───── Admin user (коллекция `admin_users`) ─────
    AdminUser:
      type: object
      description: |
        Аккаунт админа saas-admin. **Отдельная** от Student коллекция — это сотрудник
        Рокетмайнда, не ученик. Логин по email+пароль (bcrypt), сессия в JWT cookie
        `rm_admin_token`. Учётки заводит super-admin через `POST /api/admin/users`,
        сервер генерирует временный пароль и шлёт на email; первый вход — обязательная
        смена пароля.
      required: [id, email, firstName, lastName, role, isActive, createdAt]
      properties:
        id:
          type: string
          description: Идентификатор записи (Mongo ObjectId или UUID на выбор Ивана).
        email:
          type: string
          format: email
          description: Уникальный email. Используется как логин и для писем (сброс пароля, временный пароль при создании).
        firstName:
          type: string
          description: Имя. Отображается в сайдбаре «Имя Фамилия».
        lastName:
          type: string
          description: Фамилия.
        role:
          $ref: '#/components/schemas/Role'
        isActive:
          type: boolean
          description: |
            Свитч «аккаунт активен». false → не пускаем на /login (даже с верным паролем —
            возвращаем 403 `account_disabled`). Используется когда сотрудник уходит,
            но историю audit-log нужно сохранить.
        permissions:
          type: array
          description: |
            Гранулированный доступ для роли EDITOR — список путей пермиссионного дерева
            (см. `permissions/sections.ts` в коде фронта). Для SUPER_ADMIN и ADMIN
            игнорируется (у них доступ по роли). Пример: `[{path: "ai-agents", access: "EDIT"}, {path: "programs.list", access: "VIEW"}]`.
            Путь может быть статическим узлом или конкретной сущностью (`programs.list.<programId>`).
          items:
            type: object
            properties:
              path:
                type: string
                description: Точечный путь в дереве разделов.
                examples: ['ai-agents', 'programs.list', 'programs.list.abc-123']
              access:
                type: string
                enum: [VIEW, EDIT]
                description: Уровень доступа. VIEW = только просмотр. EDIT = читать+писать+удалять.
        passwordHash:
          type: string
          description: bcrypt-хеш пароля (cost=12). **Никогда** не возвращается из API наружу. Только для записи (создание/смена пароля).
          writeOnly: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: Время последнего успешного входа. Обновляется в `POST /api/admin/login`.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ───── Place (коллекция `places`) ─────
    Place:
      type: object
      description: |
        Место проведения программы — переиспользуемый справочник. Алексей заводит
        город+площадку один раз, потом выбирает её из выпадающего списка при создании
        новых программ. Чистый lookup-словарь, никаких связанных данных кроме `Program.placeId`.
      required: [id, name]
      properties:
        id: { type: string }
        name:
          type: string
          examples: ['Москва, Цифровое деловое пространство']
          description: Название места — то, что видят админы в списке. Может включать город+площадку одной строкой.
        address:
          type: string
          nullable: true
          description: Полный адрес (опц.). Используется для печати/отчётности.
        createdAt: { type: string, format: date-time }

    # ───── Program (коллекция `programs`) ─────
    Program:
      type: object
      description: |
        Программа Teacher — конкретный поток обучения (например «Бизнес-моделирование, апрель 2026»).
        У программы есть набор привязанных AI-агентов (через `ProgramAgent`) и набор учеников
        (`Student.programId`). Жизненный цикл:
          1. Алексей создаёт программу → `joinToken=null` (QR ещё нет).
          2. Жмёт «Сгенерировать QR» → `POST /api/programs/{id}/regenerate-qr` → сервер
             создаёт `joinToken` (24 random bytes base64url) → QR-код рисуется на фронте.
          3. Ученики сканируют QR → переходят на `https://teacher.rocketmind.*/join?p={id}&t={joinToken}`.
          4. Каждый день программы Алексей включает свитчи `ProgramAgent.isAvailable` для агентов.
          5. По окончании курса Алексей выключает `isActive=false` → ученики видят модалку
             «программа завершена» и могут читать чаты только по подписке.
      required: [id, title, startsAt, endsAt, isActive, createdAt]
      properties:
        id: { type: string }
        title:
          type: string
          examples: ['Бизнес-моделирование, апрель 2026']
          description: Название программы — отображается у Алексея в админке и у учеников в Teacher.
        startsAt:
          type: string
          format: date-time
          description: Дата начала программы. Пока — только для отчётности и сортировки.
        endsAt:
          type: string
          format: date-time
          description: Дата окончания. На фронте используется только для отображения.
        isActive:
          type: boolean
          description: |
            **Свитч «программа активна»** — закрывает бесплатный доступ для учеников.
            Когда `false`: участники видят модалку «программа завершена», чат уходит в
            read-only, на попытку отправить сообщение возвращаем 403 `program_closed`
            и фронт показывает плашку «оформите подписку». Изначально `true`.
        place:
          oneOf:
            - $ref: '#/components/schemas/Place'
            - type: 'null'
          description: Эмбеддед-объект места (для удобства фронта). Может быть null.
        placeId:
          type: string
          nullable: true
          description: FK на Place — используется при создании/обновлении.
        joinToken:
          type: string
          nullable: true
          description: |
            Криптостойкий токен для QR-входа (24 random bytes base64url). `null` пока
            QR не сгенерирован. При обновлении старый токен инвалидируется — старый QR
            перестаёт пускать **новых** учеников (уже привязанные продолжают работать
            через свой JWT `rm_student_token`).
        joinTokenRotatedAt:
          type: string
          format: date-time
          nullable: true
          description: Время последней ротации. Для аналитики и отчётности.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ───── AiAgent (коллекция `ai_agents`) ─────
    AiAgent:
      type: object
      description: |
        AI-агент — обучающий наставник в saas-teacher (и/или saas-akselerator).
        Каталог общий для всех SaaS-продуктов, в какие именно агент подключается —
        контролирует массив `targets[]`. Сам промпт и логика агента живут в n8n у Ивана;
        фронт обращается к агенту через `n8nWebhookUrl` и стримит ответ.
      required: [id, slug, name, targets, n8nWebhookUrl, createdAt]
      properties:
        id: { type: string }
        slug:
          type: string
          examples: ['business-modeling']
          description: Уникальный машинный slug (lowercase, dash-case). Используется в URL и для дебага. На создании генерится из имени, если не передан явно. При повторе — 409 `slug_exists`.
        name:
          type: string
          examples: ['Бизнес-моделирование']
          description: Имя агента для UI — то что увидит ученик в списке.
        role:
          type: string
          examples: ['Наставник по бизнес-модели']
          description: Под-заголовок/специализация. Опционально, для UI.
        valueDescription:
          type: string
          description: |
            Текст-приветствие, которым агент представляется при первом сообщении в чате.
            Отображается в saas-teacher при открытии сессии до первого ответа.
        targets:
          type: array
          description: |
            В какие SaaS-продукты агент подключён. Фронт фильтрует по этому массиву:
            saas-teacher показывает только агентов с `targets ∋ saas-teacher`. Чекбоксы
            в редакторе агента позволяют подключить одного агента к нескольким продуктам.
          items:
            type: string
            enum: [saas-teacher, saas-akselerator]
        avatarMascotId:
          type: string
          nullable: true
          description: FK на Mascot (картинка из общей библиотеки маскотов). Может быть null.
        avatarUrl:
          type: string
          nullable: true
          description: |
            Резолвленный URL аватара — для удобства фронта (чтобы не делать второй
            запрос). Бэк может склеить из `avatarMascot.imagePath` или из локального
            `avatarPath`, если маскот не из библиотеки.
        n8nWebhookUrl:
          type: string
          description: |
            URL вебхука n8n у Ивана (Amvera). Сюда saas-teacher шлёт `POST` с
            `{ projectId, agentId, content, context }` и стримит ответ обратно через SSE.
            Если поле пустое — агент помечается как «Не подключен», диалог с ним
            возвращает 503/400.
        n8nSecret:
          type: string
          description: |
            Опциональный shared secret для HMAC-подписи запросов. Если задан — фронт
            считает SHA-256 HMAC от тела запроса и кладёт в заголовок `X-Signature`,
            n8n проверяет на своей стороне. **Не возвращается из API** (writeOnly).
          writeOnly: true
        systemPrompt:
          type: string
          nullable: true
          description: |
            Черновик системного промпта — на behavior агента ПОКА не влияет (реальный
            промпт живёт в workflow n8n). Поле существует чтобы Алексей мог хранить
            и редактировать черновик прямо в админке. Когда подключим передачу промпта
            из БД в n8n — пометку «В разработке» снимем и поле станет load-bearing.
        notes:
          type: string
          nullable: true
          description: Свободные заметки для админов (внутренний контекст по агенту, кто настраивал, чем занят, и т.д.).
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ───── ProgramAgent (коллекция `program_agents` — M:N) ─────
    ProgramAgent:
      type: object
      description: |
        Линк-таблица программы и AI-агента. Один агент может быть подключён к нескольким
        программам, одна программа может содержать нескольких агентов. Существование
        записи означает «агент привязан к программе»; свитч `isAvailable` определяет
        видят ли ученики его прямо сейчас. Алексей по ходу курса включает агентов в
        нужный день — фронт отдаёт ученикам только тех, у кого `isAvailable=true`.
      required: [programId, agentId, isAvailable]
      properties:
        programId:
          type: string
          description: FK на Program.
        agentId:
          type: string
          description: FK на AiAgent.
        isAvailable:
          type: boolean
          description: |
            **Свитч «агент открыт для этой программы»**. true → ученики видят агента
            в сайдбаре и могут общаться. false → агент скрыт. При отправке сообщения
            к закрытому агенту бэк возвращает 403 `agent_not_available`.
        availableSince:
          type: string
          format: date-time
          nullable: true
          description: Метка времени когда агента ПОСЛЕДНИЙ раз включили. Для аналитики «когда Алексей открыл агента в курсе».

    # ───── Student (коллекция `students`) — SaaS-пользователи ─────
    Student:
      type: object
      description: |
        Ученик — конечный пользователь saas-teacher. Один email = один Student
        (пересечения курсов разруливаем руками). Привязка к программе через
        `programId` — один Student к одной программе. Аутентификация по OTP
        (email-код, 6 цифр, 10 мин TTL, bcrypt-хеш). После верификации сервер
        выдаёт JWT в HttpOnly cookie `rm_student_token` (90 дней).
      required: [id, email, isActive, joinedAt]
      properties:
        id: { type: string }
        email:
          type: string
          format: email
          description: Уникальный идентификатор ученика. Используется для OTP-логина.
        firstName:
          type: string
          nullable: true
          description: Имя. Заполняется самим учеником в онбординге или профиле.
        lastName:
          type: string
          nullable: true
          description: Фамилия. Заполняется самим учеником.
        role:
          type: string
          nullable: true
          examples: ['Генеральный директор']
          description: |
            **«Роль в бизнесе»** — поле анкеты. Идёт в payload каждого запроса к AI-агенту
            как часть `context.student`, чтобы агент понимал кому отвечает (тон, лексика).
        industry:
          type: string
          nullable: true
          examples: ['Производство']
          description: |
            **«Сфера деятельности»** — поле анкеты. Идёт в `context.student` для AI-агентов:
            наставник должен понимать индустрию ученика.
        region:
          type: string
          nullable: true
          examples: ['Московская область']
          description: |
            **«Регион»** — поле анкеты. Идёт в `context.student` (для AI-агентов важен
            географический контекст бизнеса).
        isActive:
          type: boolean
          description: |
            Свитч от админа. false → ученик не может залогиниться (403 `account_disabled`)
            и не может отправлять сообщения. Используется для бана без удаления данных.
        programId:
          type: string
          nullable: true
          description: FK на Program — программа, в которой ученик зарегистрирован. Один ученик = одна программа в MVP.
        program:
          oneOf:
            - $ref: '#/components/schemas/StudentProgramSummary'
            - type: 'null'
          description: Эмбед-объект программы для удобства фронта.
        joinedAt:
          type: string
          format: date-time
          description: Когда ученик впервые залогинился через OTP.
        joinedVia:
          type: string
          nullable: true
          examples: ['qr']
          description: Способ присоединения. Сейчас всегда 'qr' (других путей пока нет).
        updatedAt: { type: string, format: date-time }

    StudentProgramSummary:
      type: object
      description: Облегчённая версия Program — вкладывается в Student.program для фронта.
      required: [id, title, startsAt, endsAt, isActive]
      properties:
        id: { type: string }
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        isActive:
          type: boolean
          description: Важно — фронт teacher по этому полю триггерит модалку «программа завершена».
        place:
          oneOf:
            - $ref: '#/components/schemas/Place'
            - type: 'null'

    # ───── StudentProject (коллекция `student_projects`) ─────
    StudentProject:
      type: object
      description: |
        Проект ученика — единица работы в Teacher. В MVP один проект на ученика.
        Создаётся на 3-м шаге онбординга. Артефакты, сессии с агентами — всё
        привязано к проекту, не к ученику напрямую (на будущее, когда добавим
        несколько проектов на ученика).
      required: [id, studentId, name, createdAt]
      properties:
        id: { type: string }
        studentId: { type: string, description: FK на Student. }
        name:
          type: string
          examples: ['Бизнес-модель AI-консалтинга']
          description: Название проекта — что ученик хочет проработать в программе.
        profile:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Свободный JSON для произвольных полей проекта. Заполняется самим учеником
            (если решим расширить онбординг) или агентом через события (агент пишет
            «целевая аудитория = X», «текущая выручка = Y» — это попадает в profile).
            На MVP пустой `null`.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ───── StudentSession (коллекция `student_sessions`) ─────
    StudentSession:
      type: object
      description: |
        Тред общения с конкретным агентом по конкретному проекту. **Unique по паре
        (projectId, agentId)** — у одной пары ровно один thread, не пересекается с
        другими агентами. Создаётся upsert'ом на первом сообщении.
      required: [id, studentId, projectId, agentId]
      properties:
        id: { type: string }
        studentId: { type: string, description: FK на Student. Денормализация для скорости. }
        projectId: { type: string, description: FK на StudentProject. }
        agentId: { type: string, description: FK на AiAgent. }
        threadId:
          type: string
          nullable: true
          description: Опциональный ID внешнего thread'а (например в n8n / OpenAI), если бэк ведёт долгоживущий контекст на стороне агента.
        summary:
          type: string
          nullable: true
          description: |
            Авто-сводка от агента (что обсуждали). Передаётся другим агентам этого
            проекта в `context.summaries[]`, чтобы наставники видели «общую картину»
            не залезая в чужие переписки. Агент сам решает когда обновить — событие
            `summary` в SSE-стриме.
        lastMessageAt: { type: string, format: date-time, nullable: true, description: Время последнего сообщения в треде. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ───── StudentMessage (коллекция `student_messages`) ─────
    StudentMessage:
      type: object
      description: |
        Одно сообщение в треде сессии. `role=user` — от ученика, `role=assistant` —
        ответ агента (склеенный из delta-чанков SSE-стрима по окончании).
      required: [id, sessionId, role, content, createdAt]
      properties:
        id: { type: string }
        sessionId: { type: string, description: FK на StudentSession. }
        role:
          type: string
          enum: [user, assistant]
          description: Кто отправил. `user` = ученик; `assistant` = AI-агент.
        content:
          type: string
          description: Текст сообщения. Plain text (markdown допустим — фронт рендерит).
        createdAt: { type: string, format: date-time }

    # ───── StudentArtifact (коллекция `student_artifacts`) ─────
    StudentArtifact:
      type: object
      description: |
        Артефакт проекта — структурированный результат работы агента (канвас,
        документ, список и т.д.). «Общая доска» проекта: артефакты видят ВСЕ
        агенты этого проекта через `context.artifacts[]`, не только тот, кто
        создал. Так наставники работают в одной комнате без явной передачи
        контекста.
      required: [id, projectId, kind, content, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string, description: FK на StudentProject. }
        agentId:
          type: string
          nullable: true
          description: Какой агент создал артефакт. null = создан вручную (резерв на будущее).
        kind:
          type: string
          examples: ['canvas', 'doc', 'list']
          description: |
            Тип артефакта. Не enum — агент решает сам какие типы порождать.
            Известные: `canvas` (бизнес-канвас), `doc` (документ), `list` (список).
        title:
          type: string
          nullable: true
          description: Опциональный заголовок артефакта для отображения в UI.
        content:
          type: object
          additionalProperties: true
          description: |
            Произвольный JSON со структурой артефакта — для канваса это сетка ячеек,
            для документа — markdown-тело, для списка — массив пунктов. Фронт
            рендерит по `kind`.
        createdAt: { type: string, format: date-time }

    # ───── OtpCode (коллекция `otp_codes`) ─────
    OtpCode:
      type: object
      description: |
        Одноразовый код для входа ученика по email. Жизненный цикл:
          1. Ученик вводит email на /login → `POST /api/auth/request-code`.
          2. Сервер генерит 6-значный код, хеширует bcrypt'ом, кладёт в эту коллекцию
             с `expiresAt = now + 10min`. Если есть SMTP — шлёт на email; в dev без SMTP
             пишет код в stdout.
          3. Ученик вводит код → `POST /api/auth/verify-code` → сервер находит
             последний не-погашенный код для email, сверяет bcrypt'ом, помечает
             `consumedAt = now`.
          4. Сразу апсёртит Student и подписывает JWT.
        Старые/просроченные коды можно чистить cron'ом — они не нужны после использования.
      required: [id, email, codeHash, expiresAt, createdAt]
      properties:
        id: { type: string }
        email: { type: string, format: email, description: Email, на который выслан код. }
        codeHash:
          type: string
          writeOnly: true
          description: bcrypt-хеш кода (cost=10). Сравниваем с тем что ввёл ученик.
        programId:
          type: string
          nullable: true
          description: |
            Программа из `rm_program_intent` cookie (выставляется на /join при сканировании
            QR). После verify ученик привязывается к этой программе.
        expiresAt:
          type: string
          format: date-time
          description: Срок жизни кода (now + 10min).
        consumedAt:
          type: string
          format: date-time
          nullable: true
          description: Когда код был погашен (использован). null = ещё не использован.
        createdAt: { type: string, format: date-time }

    # ───── AuditLogEntry (коллекция `audit_log`, фаза 2) ─────
    AuditLogEntry:
      type: object
      description: |
        Запись лога админских действий. **В MVP-1 не делаем** — этот блок здесь чтобы
        зафиксировать формат на будущее. Пишем при критичных операциях: просмотр
        чужих анкет/чатов, изменение программ/агентов, удаление сущностей.
        Для аналитики «кто что когда менял» и для GDPR-комплаенса.
      required: [id, actorId, action, target, createdAt]
      properties:
        id: { type: string }
        actorId:
          type: string
          description: FK на AdminUser — кто совершил действие.
        actorEmail:
          type: string
          format: email
          description: Денормализация — email актора, чтобы лог читался даже после удаления админа.
        action:
          type: string
          examples: ['student.view', 'program.update', 'agent.delete']
          description: |
            Тип действия в формате `<entity>.<verb>`. Сторона бэка решает что логировать,
            без жёсткого enum'а (легко добавлять новые).
        target:
          type: string
          examples: ['student:abc-123', 'program:xyz-456']
          description: На что подействовали — `<entity>:<id>`. Удобно для фильтра «все действия с таким-то учеником».
        meta:
          type: object
          additionalProperties: true
          nullable: true
          description: Произвольный JSON с деталями (например diff для update-действий).
        ip:
          type: string
          nullable: true
          description: IP адрес актора (из request headers — X-Forwarded-For / X-Real-IP).
        userAgent:
          type: string
          nullable: true
          description: User-Agent браузера актора.
        createdAt: { type: string, format: date-time }

  # ───────────────────────────────────────────────────────────────────────────
  # RESPONSES — reusable response components
  # ───────────────────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Validation:
      description: Невалидные данные
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ───────────────────────────── Admin auth ─────────────────────────────
  /api/admin/login:
    post:
      tags: [admin-auth]
      summary: Логин админа saas-admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Успех. JWT в cookie `rm_admin_token`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/AdminUser' }
        '401': { description: Неверные креды, $ref: '#/components/responses/Unauthorized' }

  /api/admin/me:
    get:
      tags: [admin-auth]
      summary: Текущий админ + его пермиссии
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/AdminUser' }
                  permissions:
                    type: array
                    items: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/admin/logout:
    post:
      tags: [admin-auth]
      summary: Logout (очистка cookie)
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  # ──────────────────────── Admin password reset / email ────────────────
  /api/admin/password-reset/send:
    post:
      tags: [admin-auth]
      summary: Отправить ссылку на сброс пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses: { '200': { description: OK }, '404': { description: Not found } }

  /api/admin/password-reset/complete:
    post:
      tags: [admin-auth]
      summary: Установить новый пароль по токену
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses: { '200': { description: OK }, '400': { $ref: '#/components/responses/Validation' } }

  # ─────────────────────────── Admin users ──────────────────────────────
  /api/admin/users:
    get:
      tags: [admin-users]
      summary: Список админов
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/AdminUser' } }
    post:
      tags: [admin-users]
      summary: Создать админа
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName, role]
              properties:
                email: { type: string, format: email }
                firstName: { type: string }
                lastName: { type: string }
                role: { $ref: '#/components/schemas/Role' }
      responses:
        '201':
          description: Created. Сервер генерирует пароль и шлёт на email.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUser' }

  /api/admin/users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      tags: [admin-users]
      summary: Карточка админа
      security: [{ AdminJWT: [] }]
      responses: { '200': { content: { application/json: { schema: { $ref: '#/components/schemas/AdminUser' } } } } }
    patch:
      tags: [admin-users]
      summary: Обновить админа
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                role: { $ref: '#/components/schemas/Role' }
      responses: { '200': { description: OK } }
    delete:
      tags: [admin-users]
      summary: Удалить админа
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  /api/admin/users/{id}/permissions:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    put:
      tags: [admin-users]
      summary: Заменить пермиссии админа (только super-admin)
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  path: { type: string }
                  access: { type: string, enum: [VIEW, EDIT] }
      responses: { '200': { description: OK } }

  /api/admin/users/{id}/freeze:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      tags: [admin-users]
      summary: Заморозить аккаунт (isActive=false)
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  /api/admin/users/{id}/unfreeze:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      tags: [admin-users]
      summary: Разморозить аккаунт
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  # ─────────────────────────────── Places ───────────────────────────────
  /api/places:
    get:
      tags: [places]
      summary: Справочник мест проведения программ
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Place' } }

  # ─────────────────────────────── Programs ─────────────────────────────
  /api/programs:
    get:
      tags: [programs]
      summary: Список программ
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Program' } }
    post:
      tags: [programs]
      summary: Создать программу
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, startsAt, endsAt]
              properties:
                title: { type: string }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
                placeName: { type: string, nullable: true }
      responses:
        '201': { content: { application/json: { schema: { $ref: '#/components/schemas/Program' } } } }

  /api/programs/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [programs]
      summary: Детали программы (с агентами и учениками)
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Program'
                  - type: object
                    properties:
                      agents:
                        type: array
                        items: { $ref: '#/components/schemas/ProgramAgent' }
                      students:
                        type: array
                        items: { $ref: '#/components/schemas/Student' }
    patch:
      tags: [programs]
      summary: Обновить программу (включая свитч isActive)
      security: [{ AdminJWT: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                startsAt: { type: string, format: date-time }
                endsAt: { type: string, format: date-time }
                placeName: { type: string, nullable: true }
                # Закрыть программу → ученики видят модалку и read-only-чат.
                isActive: { type: boolean }
      responses: { '200': { content: { application/json: { schema: { $ref: '#/components/schemas/Program' } } } } }
    delete:
      tags: [programs]
      summary: Удалить программу (ученики останутся без привязки)
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  /api/programs/{id}/regenerate-qr:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      tags: [programs]
      summary: Сгенерировать / обновить joinToken (старый QR инвалидируется)
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  joinToken: { type: string }
                  joinTokenRotatedAt: { type: string, format: date-time }

  /api/programs/active:
    get:
      tags: [programs]
      summary: Активная программа для текущего ученика (saas-teacher)
      security: [{ StudentJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  program: { $ref: '#/components/schemas/StudentProgramSummary' }
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        slug: { type: string }
                        name: { type: string }
                        role: { type: string }
                        valueDescription: { type: string }
                        avatarUrl: { type: string, nullable: true }
                        isAvailable: { type: boolean }

  /api/program-agents:
    post:
      tags: [programs]
      summary: Upsert связки агент↔программа (включить/выключить агента)
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [programId, agentId, isAvailable]
              properties:
                programId: { type: string }
                agentId: { type: string }
                isAvailable: { type: boolean }
      responses: { '200': { description: OK } }

  # ────────────────────────────── AI-agents ─────────────────────────────
  /api/ai-agents:
    get:
      tags: [ai-agents]
      summary: Список всех AI-агентов (фильтр по target опционально)
      security: [{ AdminJWT: [] }]
      parameters:
        - name: target
          in: query
          schema: { type: string, enum: [saas-teacher, saas-akselerator] }
      responses:
        '200':
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/AiAgent' } }
    post:
      tags: [ai-agents]
      summary: Создать AI-агента
      security: [{ AdminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name, n8nWebhookUrl, targets]
              properties:
                slug: { type: string }
                name: { type: string }
                role: { type: string }
                valueDescription: { type: string }
                targets:
                  type: array
                  items: { type: string, enum: [saas-teacher, saas-akselerator] }
                avatarMascotId: { type: string, nullable: true }
                n8nWebhookUrl: { type: string }
                n8nSecret: { type: string }
                systemPrompt: { type: string }
                notes: { type: string }
      responses:
        '201': { content: { application/json: { schema: { $ref: '#/components/schemas/AiAgent' } } } }

  /api/ai-agents/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [ai-agents]
      security: [{ AdminJWT: [] }]
      responses:
        '200': { content: { application/json: { schema: { $ref: '#/components/schemas/AiAgent' } } } }
    patch:
      tags: [ai-agents]
      summary: Обновить агента
      security: [{ AdminJWT: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AiAgent' }
      responses: { '200': { description: OK } }
    delete:
      tags: [ai-agents]
      summary: Удалить агента (каскадно отключает в программах)
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  # ─────────────────────────────── Students ─────────────────────────────
  /api/students:
    get:
      tags: [students]
      summary: Список SaaS-пользователей (с анкетами)
      security: [{ AdminJWT: [] }]
      parameters:
        - { name: programId, in: query, schema: { type: string } }
        - { name: query, in: query, schema: { type: string }, description: search by email/name }
      responses:
        '200':
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Student' } }

  /api/students/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [students]
      summary: Карточка ученика (анкета + проекты + сессии)
      security: [{ AdminJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Student'
                  - type: object
                    properties:
                      projects:
                        type: array
                        items: { $ref: '#/components/schemas/StudentProject' }
                      sessions:
                        type: array
                        items: { $ref: '#/components/schemas/StudentSession' }
    patch:
      tags: [students]
      summary: Обновить ученика (admin-side — например, isActive)
      security: [{ AdminJWT: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive: { type: boolean }
                firstName: { type: string }
                lastName: { type: string }
                role: { type: string }
                industry: { type: string }
                region: { type: string }
      responses: { '200': { description: OK } }
    delete:
      tags: [students]
      summary: Удалить ученика (cascade — projects/sessions/messages/artifacts)
      security: [{ AdminJWT: [] }]
      responses: { '200': { description: OK } }

  # ─────────────────────────── Student auth (OTP) ───────────────────────
  /api/auth/request-code:
    post:
      tags: [student-auth]
      summary: Запросить 6-значный код на email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: Код отправлен (даже если email неизвестен — для anti-enum) }

  /api/auth/verify-code:
    post:
      tags: [student-auth]
      summary: Проверить код, апсёртнуть Student, выдать JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string, pattern: '^\d{6}$' }
      responses:
        '200':
          description: Успех. JWT в cookie `rm_student_token`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  student: { $ref: '#/components/schemas/Student' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: account_disabled — админ отключил ученика
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/me:
    get:
      tags: [student-me]
      summary: Текущий ученик (анкета + программа + проект)
      security: [{ StudentJWT: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    oneOf:
                      - allOf:
                          - $ref: '#/components/schemas/Student'
                          - type: object
                            properties:
                              project:
                                oneOf:
                                  - $ref: '#/components/schemas/StudentProject'
                                  - type: 'null'
                      - type: 'null'

  /api/auth/logout:
    post:
      tags: [student-auth]
      summary: Logout (очистка cookie)
      responses: { '200': { description: OK } }

  # ─────────────────────────── Student profile ──────────────────────────
  /api/students/me:
    patch:
      tags: [student-me]
      summary: Обновить анкету (имя/фамилия/роль/сфера/регион)
      security: [{ StudentJWT: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                role: { type: string, description: '«Роль в бизнесе»' }
                industry: { type: string, description: '«Сфера деятельности»' }
                region: { type: string, description: '«Регион»' }
      responses: { '200': { description: OK } }

  /api/students/me/projects:
    post:
      tags: [student-me]
      summary: Создать первый проект
      security: [{ StudentJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201': { content: { application/json: { schema: { $ref: '#/components/schemas/StudentProject' } } } }

  # ─────────────────────────────── Chat ─────────────────────────────────
  /api/chat:
    post:
      tags: [chat]
      summary: Отправка сообщения AI-агенту, ответ стримится через SSE.
      description: |
        ## Алгоритм работы
        1. Сервер проверяет JWT ученика → если нет, 401.
        2. Проверяет что `projectId` принадлежит этому Student.
        3. Проверяет `Program.isActive` → если false, **403 `program_closed`**
           (saas-teacher показывает плашку «оформите подписку»).
        4. Проверяет `ProgramAgent.isAvailable` для (program, agent) → если false,
           **403 `agent_not_available`**.
        5. Апсёртит `StudentSession` по уникальной паре (projectId, agentId).
        6. Сохраняет входящее сообщение как `StudentMessage(role=user)`.
        7. Собирает `context` (см. ниже) и зовёт n8n webhook агента.
        8. Стримит delta-чанки SSE-ответом в браузер.
        9. По окончании сохраняет `StudentMessage(role=assistant)` + опционально
           обновляет `summary` и пишет `StudentArtifact`-ы.

        ## Payload в n8n
        Бэк формирует и шлёт в `agent.n8nWebhookUrl`:
        ```
        {
          "content": "...сообщение ученика...",
          "context": {
            "project": { "name": "...", "profile": {...} },
            "student": { "firstName": "...", "lastName": "...", "email": "...",
                         "role": "...", "industry": "...", "region": "..." },
            "history": [ {role, content}, ... ],  // последние 50 в этом треде
            "artifacts": [ ... ],                 // последние 20 артефактов проекта
            "summaries": [ { agentSlug, summary } ] // сводки от ДРУГИХ агентов
          }
        }
        ```
        Если у агента задан `n8nSecret` — добавить `X-Signature: sha256=<HMAC>` header.

        ## SSE event-схема
        Каждое событие в формате `event: <name>\ndata: <json>\n\n`:
        - `delta` — `{ text: "следующий чанк" }` — текст ответа, склеивается на фронте.
        - `summary` — `{ summary: "..." }` — обновить `StudentSession.summary`.
        - `artifact` — `{ kind, title, content }` — создать `StudentArtifact`.
        - `done` — `{}` — стрим завершён, фронт коммитит финальный `StudentMessage`.
      security: [{ StudentJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, agentId, content]
              properties:
                projectId:
                  type: string
                  description: ID проекта, в контексте которого идёт диалог.
                agentId:
                  type: string
                  description: ID агента, кому отправляется сообщение.
                content:
                  type: string
                  minLength: 1
                  description: Текст сообщения от ученика.
      responses:
        '200':
          description: SSE-стрим (`text/event-stream`) — см. event-схему в description.
          content:
            text/event-stream:
              schema:
                type: string
        '403':
          description: |
            Доступ закрыт. Причины (в поле `error`):
              - `program_closed` — программа выключена админом → фронт показывает плашку подписки
              - `agent_not_available` — агент не открыт для этой программы → фронт перезагружает список агентов
              - `account_disabled` — админ отключил ученика → фронт идёт на /login
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ─────────────────────────────── Audit log ────────────────────────────
  /api/admin/audit-log:
    get:
      tags: [audit-log]
      summary: Лог админских действий (этап 2)
      security: [{ AdminJWT: [] }]
      parameters:
        - { name: actorId, in: query, schema: { type: string } }
        - { name: action, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditLogEntry' }

  # ───────────────────────────── Mascots (cross-app) ────────────────────
  # Эти endpoints живут на site-admin (Postgres), не на бэке Ивана.
  # saas-admin использует их через cross-origin запросы с X-Service-Token.
  # Документируем здесь для полноты картины.
  /api/mascots:
    get:
      tags: [ai-agents]
      summary: |
        Список маскотов (живёт на site-admin, общая библиотека визуальных
        ассетов). В будущем переедет на S3 Yandex.
      security: [{ ServiceToken: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    pack: { type: string, nullable: true }
                    imagePath: { type: string }
                    isBuiltIn: { type: boolean }
