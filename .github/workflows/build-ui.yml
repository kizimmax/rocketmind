name: Build UI Package

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: packages/ui
        run: npm install
      - name: Build package
        working-directory: packages/ui
        run: npm run build
      - name: Commit dist
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'build: update @rocketmind/ui dist'
          file_pattern: 'packages/ui/dist/**'
