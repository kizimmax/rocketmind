name: Deploy Site + Design System + Internal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'apps/design-system/**'
      - 'apps/internal/**'
      - 'packages/ui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build UI package
        run: npm run ui:build
      - name: Build Site
        run: npm run build --workspace=apps/site
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /rocketmind
      - name: Build Design System
        run: npm run build --workspace=apps/design-system
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /rocketmind/ds
      - name: Build Internal (R-Plan)
        run: npm run build --workspace=apps/internal
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /rocketmind
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      - name: Combine outputs
        run: |
          mkdir -p _out/ds
          cp -r apps/site/out/. _out/
          cp -r apps/design-system/out/. _out/ds/
          cp -r apps/internal/out/r-plan _out/r-plan
          cp -r apps/internal/out/_next/. _out/_next/
          touch _out/.nojekyll
      - name: Generate SPA fallback 404
        run: |
          cat > _out/404.html << 'HTML'
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>Redirect</title><script>
          (function(){
            var p = window.location.pathname;
            var m = p.match(/^\/rocketmind\/r-plan\/([a-z0-9-]+)\/?$/);
            if (m) { window.location.replace('/rocketmind/r-plan/?track=' + m[1]); }
          })();
          </script></head><body><p>Page not found.</p></body></html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
