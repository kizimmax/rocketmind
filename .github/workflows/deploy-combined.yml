name: Deploy Site + Design System + Internal to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'apps/design-system/**'
      - 'apps/internal/**'
      - 'packages/ui/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build UI package
        run: npm run ui:build
      - name: Build Site
        run: npm run build --workspace=apps/site
        env:
          NODE_ENV: production
      - name: Build Design System
        run: npm run build --workspace=apps/design-system
        env:
          NODE_ENV: production
      - name: Build Internal (Gantt)
        run: npm run build --workspace=apps/internal
        env:
          NODE_ENV: production
      - name: Combine outputs
        run: |
          mkdir -p _out/ds _out/plan
          cp -r apps/site/out/. _out/
          cp -r apps/design-system/out/. _out/ds/
          cp -r apps/internal/out/. _out/plan/
          touch _out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
