name: Deploy SaaS to GitHub Pages (rocketmind-saas)

on:
  push:
    branches: [main]
    paths:
      - 'apps/saas/**'
      - 'packages/ui/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts
      - name: Build UI package
        run: npm run ui:build
      - name: Build SaaS
        run: npm run build --workspace=apps/saas
        env:
          NODE_ENV: production
      - name: Deploy to rocketmind-saas
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.SAAS_DEPLOY_TOKEN }}
          external_repository: kizimmax/rocketmind-saas
          publish_branch: gh-pages
          publish_dir: apps/saas/out
