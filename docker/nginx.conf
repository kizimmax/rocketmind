server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # ── Site (SSR → проксируем на Next.js port 3000) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SaaS (/app — статика) ─────────────────────────────────────────────────
    location /app/ {
        alias /app/static/saas/;
        try_files $uri $uri.html $uri/ /app/index.html;
    }

    location /app/_next/static/ {
        alias /app/static/saas/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── R-Plan (/r-plan — статика) ────────────────────────────────────────────
    location /r-plan/ {
        alias /app/static/site/r-plan/;
        try_files $uri $uri.html $uri/ /app/static/site/r-plan/index.html;
    }
}
